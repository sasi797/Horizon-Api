server {
    listen 80;
    server_name split.api.spl-unboxed.com _;

    client_max_body_size 25m;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;

    }
}

server {
    listen 443 ssl;
    server_name split.api.spl-unboxed.com _;

    # TEMPORARY self-signed cert for the raw IP (13.63.125.11), since
    # Let's Encrypt cannot issue certs for bare IPs and DNS for
    # split.api.spl-unboxed.com isn't pointed at this instance yet.
    # Once DNS is live, run certbot for the real domain and swap these
    # two paths for the Let's Encrypt-issued cert.
    ssl_certificate     /etc/letsencrypt/live/13.63.125.11/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/13.63.125.11/privkey.pem;

    client_max_body_size 25m;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;

    }
}
