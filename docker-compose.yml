services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    restart: always

  api:
    build: .
    image: ${IMAGE:-bts-backend:latest}
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: always

  worker:
    image: ${IMAGE:-bts-backend:latest}
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  beat:
    image: ${IMAGE:-bts-backend:latest}
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

volumes:
  redis_data:
